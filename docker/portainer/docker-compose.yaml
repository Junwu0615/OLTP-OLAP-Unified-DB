version: '3.8'

services:
  task:
    image: portainer/portainer-ce:latest # 使用 Portainer CE 最新穩定版
    container_name: portainer
    restart: unless-stopped
    ports:
      - '9000:9000'   # http://localhost:9000
      - '9443:9443'   # https://localhost:9443

    volumes:
      # 用 WSL2 啟動，避免遇到路徑映射問題
      - '/var/run/docker.sock:/var/run/docker.sock'

      # 用 Docker Desktop 啟動 # 但是 Portainer 不支援 pipe 格式的 volume 映射
      # - '\\.\pipe\docker_engine:\\.\pipe\docker_engine'

      # 持久化保存路徑
      - './data:/data'

    security_opt: # 允許 Portainer 在 Linux 上以 root 權限執行，某些功能可能需要
      - no-new-privileges:true