# ansible/deploy_config.yml

- name: Configure Monitoring Stack
  hosts: localhost
  vars:
    postgres_exporter_host: 'host.docker.internal'
    node_exporter_host: 'host.docker.internal'
    config_path: '../docker/monitoring/prometheus.yaml'

  tasks:
    - name: Generate Prometheus Configuration from Template
      template:
        src: templates/prometheus.yml.j2
        dest: '{{ config_path }}'

    - name: Reload Prometheus Service
      community.docker.docker_container:
        name: ooud-cluster-prometheus-1
        state: started
        restart: yes
      tags: reload